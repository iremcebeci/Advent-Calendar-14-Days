<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Day 1 | Advent Calendar</title>
	<link rel="icon" type="image/png" href="images/icon_light.png">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="splash">
		<img src="images/icon_light.png" alt="Loading">
		<p>Preparing the gifts...</p>
	</div>

	<div id="snow-layer"></div>

	<div class="parent">
		<div class="title"><a href="index.html" class="home-link"></a></div>
		<div class="leftside"> </div>
		<div class="rightside"> </div>
		<div class="footer"> </div>
		<div class="bell-container">
			<div class="bell-wrapper">
    <img src="images/bell.png" class="bell-back">
    <img src="images/bell_stick.png" class="bell-stick" id="bellStick">
    <img src="images/bell_front.png" class="bell-front">
  </div>

  <audio id="bellSound" src="sounds/bell.mp3"></audio>
		</div>
	</div>

	<script>
	const snowLayer = document.getElementById("snow-layer");

	function createSnowflake() {
		const snowflake = document.createElement("div");
		snowflake.className = "snowflake";
		snowflake.innerHTML = "❄";

		snowflake.style.left = Math.random() * 100 + "vw";
		snowflake.style.animationDuration = 4 + Math.random() * 6 + "s";
		snowflake.style.fontSize = 8 + Math.random() * 14 + "px";
		snowflake.style.opacity = Math.random();

		snowLayer.appendChild(snowflake);

		setTimeout(() => {
			snowflake.remove();
		}, 10000);
	}

	setInterval(createSnowflake, 90);

	window.addEventListener("load", () => {
	const splash = document.getElementById("splash");

	setTimeout(() => {
			splash.classList.add("hide");
		}, 1500);
	});

	const stick = document.getElementById("bellStick");
const sound = document.getElementById("bellSound");

let isDragging = false;
let targetAngle = 0;
let currentAngle = 0;
let lastX = 0;
let velocity = 0;
let lastRingTime = 0;

const MAX_ANGLE = 30;
const RING_THRESHOLD = 6;
const RING_COOLDOWN = 300;
const EASING = 0.15;

// drag start
stick.addEventListener("mousedown", e => {
  isDragging = true;
  lastX = e.clientX;
  stick.style.cursor = "grabbing";
});

// drag end
document.addEventListener("mouseup", () => {
  isDragging = false;
  targetAngle = 0;
  stick.style.cursor = "grab";
});

// mouse move
document.addEventListener("mousemove", e => {
  if (!isDragging) return;

  const dx = e.clientX - lastX;
  lastX = e.clientX;

  velocity = dx;
  targetAngle = Math.max(-MAX_ANGLE, Math.min(MAX_ANGLE, dx * 2));

  const now = Date.now();
  if (Math.abs(dx) > RING_THRESHOLD && now - lastRingTime > RING_COOLDOWN) {
    sound.currentTime = 0;
    sound.volume = Math.min(1, Math.abs(dx) / 20);
    sound.play();
    lastRingTime = now;
  }
});

// smooth animation loop
function animate() {
  currentAngle += (targetAngle - currentAngle) * EASING;

  stick.style.transform =
    `translateX(-50%) rotate(${currentAngle}deg)`;

  requestAnimationFrame(animate);
}

animate();
	
</script>
</body>
</html>
